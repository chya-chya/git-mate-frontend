version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: git-mate-frontend
    container_name: git-mate-frontend
    ports:
      - "3001:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    stdin_open: true
    tty: true
